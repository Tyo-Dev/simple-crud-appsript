
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPD News</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #fafafa; }
    .article-card img { transition: transform 0.3s ease; }
    .article-card:hover img { transform: scale(1.05); }
  </style>
</head>
<body class="text-gray-800">

  <!-- Header -->
  <header class="border-b bg-white sticky top-0 z-50 shadow-sm">
    <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-gray-900">PPD News</h1>
      <nav class="space-x-4">
        <a href="#" class="text-gray-600 hover:text-gray-900">Beranda</a>
        <a href="#" class="text-gray-600 hover:text-gray-900">Kategori</a>
        <a href="#" class="text-gray-600 hover:text-gray-900">Tentang</a>
      </nav>
    </div>
  </header>

  <!-- Hero -->
  <section class="max-w-5xl mx-auto px-4 py-12 text-center">
    <h2 class="text-4xl font-extrabold mb-4">Berita Terkini Seputar PPD</h2>
    <p class="text-gray-600 text-lg">Ikuti kabar terbaru dan artikel menarik dari tim kami.</p>
  </section>

  <!-- Daftar Berita -->
  <main class="max-w-5xl mx-auto px-4 py-8 grid md:grid-cols-2 gap-8" id="blogContainer">
    <!-- Artikel akan dimuat lewat JavaScript -->
  </main>

  <!-- Loading -->
  <div id="loading" class="text-center text-gray-500 py-10">Memuat berita...</div>

  <!-- Footer -->
  <footer class="border-t bg-white mt-12">
    <div class="max-w-5xl mx-auto px-4 py-6 text-center text-gray-500 text-sm">
      &copy; 2025 PPD News. Semua Hak Dilindungi.
    </div>
  </footer>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxtm3nFnlMiTtqxmuLuyPFlS4fkInU8qB-PPs8G4I0T_ebTynTOi1yPdwtZ2wDicpye/exec"; // Ganti dengan URL kamu

    async function loadArticles() {
      const container = document.getElementById("blogContainer");
      const loading = document.getElementById("loading");

      try {
        const res = await fetch(API_URL, { cache: "no-cache" });
        const data = await res.json();
        container.innerHTML = "";
        loading.style.display = "none";

        if (data.length === 0) {
          container.innerHTML = "<p class='text-gray-500'>Belum ada berita tersedia.</p>";
          return;
        }

        data.forEach(article => {
          const card = document.createElement("article");
          card.className = "article-card bg-white rounded-lg overflow-hidden shadow hover:shadow-md transition";

          card.innerHTML = `
            <img src="${article.gambar}" alt="${article.judul}" class="w-full h-56 object-cover">
            <div class="p-5">
              <h3 class="text-2xl font-semibold mb-2 text-gray-900">${article.judul}</h3>
              <p class="text-gray-600 mb-4 line-clamp-3">${article.deskripsi}</p>
              <p class="text-sm text-gray-400">${article.tanggal}</p>
            </div>
          `;

          container.appendChild(card);
        });
      } catch (error) {
        console.error("Gagal memuat artikel:", error);
        loading.textContent = "Gagal memuat berita. Coba refresh halaman.";
      }
    }

    loadArticles();
  </script>

</body>
</html>
